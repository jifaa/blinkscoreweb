<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BlinkScore | Reader Mode</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&amp;family=Geist:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .reader-bg {
            background-color: #010102;
        }
        .score-paper {
            background-color: #F9F8F4;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        @keyframes pulse-emerald {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
        }
        .animate-tracking-pulse {
            animation: pulse-emerald 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #010102;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #27272A;
            border-radius: 10px;
        }
        .fit-control-active {
            background-color: #10b981;
            color: #002113;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "performance-emerald": "#10B981",
                      "background": "#010102",
                      "on-surface": "#e2e2e8",
                      "surface-stroke": "#27272A",
                      "primary": "#4edea3"
              },
              "fontFamily": {
                      "headline": ["Geist"],
                      "body": ["Geist"],
                      "mono": ["JetBrains Mono"]
              }
            },
          },
        }
    </script>
</head>
<body class="reader-bg text-on-surface font-body overflow-hidden select-none h-screen w-screen relative">
<!-- Top UI Layer -->
<header class="absolute top-0 left-0 w-full z-40 p-6 flex justify-between items-start pointer-events-none">
<button class="pointer-events-auto flex items-center gap-2 px-4 py-2 rounded-lg bg-black/40 hover:bg-black/60 border border-white/10 transition-colors text-sm font-semibold backdrop-blur-md">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
<span>Exit</span>
</button>
<div class="pointer-events-auto">
<button class="w-10 h-10 flex items-center justify-center rounded-lg bg-black/40 hover:bg-black/60 border border-white/10 transition-colors group">
<span class="material-symbols-outlined text-on-surface group-hover:text-performance-emerald transition-colors">settings</span>
</button>
</div>
</header>
<!-- Main Reader View -->
<main class="w-full h-full flex items-center justify-center relative px-12">
<!-- Sheet Music Canvas -->
<div class="score-paper w-full max-w-[900px] h-[92vh] overflow-y-auto custom-scrollbar relative flex flex-col items-center p-12 transition-all duration-300">
<!-- Sheet Music Mock Content -->
<div class="w-full flex justify-between items-baseline border-b-2 border-black pb-4 mb-12">
<h1 class="text-5xl font-serif italic font-extrabold text-black">Concerto No. 2</h1>
<span class="text-2xl font-serif text-black">S. Rachmaninoff</span>
</div>
<div class="w-full space-y-16 opacity-90 relative">
<!-- Staves Mockup -->
<div class="w-full h-32 border-t border-black relative" style="background-image: linear-gradient(black 1px, transparent 1px); background-size: 100% 16px;">
<div class="absolute -left-4 -top-2 text-6xl font-serif text-black">𝄞</div>
</div>
<div class="w-full h-32 border-t border-black" style="background-image: linear-gradient(black 1px, transparent 1px); background-size: 100% 16px;"></div>
<div class="w-full h-32 border-t border-black" style="background-image: linear-gradient(black 1px, transparent 1px); background-size: 100% 16px;"></div>
<div class="w-full h-32 border-t border-black" style="background-image: linear-gradient(black 1px, transparent 1px); background-size: 100% 16px;"></div>
<!-- The actual score content representation -->
<img alt="Complex classical piano score page" class="absolute inset-0 w-full h-full object-contain pointer-events-none p-4 mix-blend-multiply" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC2bnCFKWn2nU4_cQ3HQjeSoUjweSHJiVktegaSZjRGN7sG8IwnUPjOZQ1BFFaFkIJk_s3XsEc_C8rSVuNp3gmP7u6CvGWp1pPXXWwJid1ytEp9Dn1IHV-ch_NaU4_clAaBvvMwLFg8ph5frEfxZxiFJfRHKrah6EapiibvaXETZwss_dWZgEBq03Nm3C2JYvINYEuIKYo5rbHP6Cht6RdCKzvPmJo259zE_t8i_5Cfy6W4Tp39SqRQMRNE2OuJzxVI01vObQHXdX4"/>
</div>
</div>
<!-- Navigation Flanks -->
<button class="absolute left-0 top-0 h-full w-24 flex items-center justify-center group hover:bg-white/5 transition-all" onclick="prevPage()">
<span class="material-symbols-outlined text-4xl text-white/20 group-hover:text-performance-emerald transition-colors">chevron_left</span>
</button>
<button class="absolute right-0 top-0 h-full w-24 flex items-center justify-center group hover:bg-white/5 transition-all" onclick="nextPage()">
<span class="material-symbols-outlined text-4xl text-white/20 group-hover:text-performance-emerald transition-colors">chevron_right</span>
</button>
</main>
<!-- Bottom UI Layer -->
<div class="absolute bottom-0 left-0 w-full z-40 p-8 flex justify-between items-end pointer-events-none">
<!-- Tracking Status -->
<div class="flex items-end gap-6 pointer-events-auto">
<div class="flex flex-col gap-2">
<div class="flex items-center gap-3 bg-black/40 px-3 py-1.5 rounded-full border border-white/10 backdrop-blur-md">
<span class="w-2.5 h-2.5 rounded-full bg-performance-emerald animate-tracking-pulse"></span>
<span class="text-xs font-semibold tracking-wider uppercase">Tracking Active</span>
</div>
<div class="w-[200px] h-[150px] bg-black rounded-lg border border-white/10 overflow-hidden relative shadow-2xl">
<img alt="Webcam tracking preview" class="w-full h-full object-cover grayscale opacity-60 contrast-125" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAQ88HTw_6aqnrEJp1smLGgouQWWp6LKo3zgGjtEY2ERmK4AHDEkdmSlDJbwwDKQIJth8wtXfSMTCtXYA-KkG7GeDIrHpgN93tQlij8Yd4oLHpPjpEKE47H7sPVHVYDx6Crec_QRzXbAzOh_RqkYfSYAfukwvS9AOj7Emr5NK6yH_E5VAWHDwUUnEx6rHjqR_I3denBMDXTN5h7LWwwb4ImCFdJVGzpqM7neuc0bFGeVz1kvFWnF2_MM5BpPdI9mn30X4cFKTZhIlA"/>
<div class="absolute inset-0 flex items-center justify-center">
<!-- Landmark Overlay simulation -->
<svg class="w-full h-full text-performance-emerald/40" viewbox="0 0 100 100">
<circle cx="50" cy="50" fill="none" r="30" stroke="currentColor" stroke-dasharray="2 2" stroke-width="0.5"></circle>
<path d="M40 45 Q50 40 60 45" fill="none" stroke="currentColor" stroke-width="1"></path>
<circle cx="42" cy="48" fill="currentColor" r="1.5"></circle>
<circle cx="58" cy="48" fill="currentColor" r="1.5"></circle>
</svg>
</div>
</div>
</div>
</div>
<!-- Center Controls -->
<div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-6 pointer-events-auto">
<!-- Page Counter -->
<div class="bg-black/60 backdrop-blur-xl px-6 py-2 rounded-full border border-white/10 shadow-2xl flex items-center gap-3">
<span class="text-xs text-white/40 uppercase font-semibold tracking-widest">Page</span>
<div class="font-mono text-xl flex items-center gap-1.5">
<span class="text-performance-emerald">3</span>
<span class="text-white/20">/</span>
<span class="text-white/60">24</span>
</div>
</div>
<!-- Fit Mode Toggle -->
<div class="flex p-1 bg-black/60 backdrop-blur-xl rounded-lg border border-white/10 shadow-lg">
<button class="px-4 py-1.5 text-xs font-bold rounded fit-control-active transition-all">AUTO</button>
<button class="px-4 py-1.5 text-xs font-bold rounded text-white/40 hover:text-white transition-all">WIDTH</button>
<button class="px-4 py-1.5 text-xs font-bold rounded text-white/40 hover:text-white transition-all">HEIGHT</button>
</div>
</div>
<!-- Version/Status Branding -->
<div class="text-[10px] font-mono text-white/20 pointer-events-auto uppercase tracking-[0.2em]">
            BlinkScore • Stage Mode
        </div>
</div>
<script>
        function nextPage() {
            const canvas = document.querySelector('.score-paper');
            canvas.style.transform = 'translateX(-20px) scale(0.99)';
            canvas.style.opacity = '0.5';
            setTimeout(() => {
                canvas.style.transform = 'translateX(0) scale(1)';
                canvas.style.opacity = '1';
            }, 200);
        }

        function prevPage() {
            const canvas = document.querySelector('.score-paper');
            canvas.style.transform = 'translateX(20px) scale(0.99)';
            canvas.style.opacity = '0.5';
            setTimeout(() => {
                canvas.style.transform = 'translateX(0) scale(1)';
                canvas.style.opacity = '1';
            }, 200);
        }

        // Hide UI on idle
        let uiTimeout;
        const hideUI = () => {
            const layers = document.querySelectorAll('header, .absolute.bottom-0');
            layers.forEach(l => l.style.opacity = '0.1');
            document.body.style.cursor = 'none';
        };
        const showUI = () => {
            const layers = document.querySelectorAll('header, .absolute.bottom-0');
            layers.forEach(l => l.style.opacity = '1');
            document.body.style.cursor = 'default';
            clearTimeout(uiTimeout);
            uiTimeout = setTimeout(hideUI, 4000);
        };
        document.addEventListener('mousemove', showUI);
        document.addEventListener('mousedown', showUI);
        showUI();
    </script>
</body></html>
